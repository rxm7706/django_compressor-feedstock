# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.6.0"

package:
  name: django-compressor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-compressor/django_compressor-${{ version }}.tar.gz
  sha256: c7478feab98f3368780591f9ee28a433350f5277dd28811f7f710f5bc6dff3c0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - django-appconf >=1.0.3
    - rcssmin >=1.2.1
    - rjsmin >=1.2.4

tests:
  - python:
      imports:
        - compressor
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/django-compressor
  license: MIT
  license_file: LICENSE
  summary: Compresses linked and inline JavaScript or CSS into single cached files.
  description: |
    Compresses linked and inline JavaScript or CSS into single cached files.
  repository: https://github.com/django-compressor/django-compressor
  documentation: https://django-compressor.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - cshaley
    - sannykr
    - rxm7706
